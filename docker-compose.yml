version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: placeiq-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: placeiq-server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/placeiq
      - NODE_ENV=production
    depends_on:
      - mongodb

  scraper:
    build:
      context: ./scraper-service
      dockerfile: Dockerfile
    container_name: placeiq-scraper
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    depends_on:
      - server

volumes:
  mongo-data:
